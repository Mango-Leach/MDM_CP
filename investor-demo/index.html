<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH-UV Node | Investor Dashboard</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="glass-header">
        <div class="logo">
            <i class="fa-solid fa-droplet"></i>
            <h1>LSH-UV <span>NODE</span></h1>
        </div>
        <button id="sync-btn" class="sync-button">
            <i class="fa-solid fa-satellite-dish"></i> Simulate Hardware Sync
        </button>
    </header>

    <main class="dashboard-grid">
        <!-- Telemetry Card -->
        <section class="glass-card telemetry-card">
            <h2>Live Telemetry</h2>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-icon blue"><i class="fa-solid fa-water"></i></div>
                    <div class="metric-info">
                        <span class="label">Hydration Level</span>
                        <span class="value" id="val-hydration">-- %</span>
                    </div>
                </div>
                <div class="metric">
                    <div class="metric-icon orange"><i class="fa-solid fa-sun"></i></div>
                    <div class="metric-info">
                        <span class="label">UV Index</span>
                        <span class="value" id="val-uv">-- UVI</span>
                    </div>
                </div>
            </div>
            
            <div class="score-container">
                <svg class="progress-ring" width="160" height="160">
                    <circle class="progress-ring__circle_bg" stroke="rgba(255,255,255,0.1)" stroke-width="12" fill="transparent" r="70" cx="80" cy="80"/>
                    <circle id="score-ring" class="progress-ring__circle" stroke="#00f3ff" stroke-width="12" fill="transparent" r="70" cx="80" cy="80"/>
                </svg>
                <div class="score-text">
                    <h3 id="val-score">0</h3>
                    <p>Skin Score</p>
                </div>
            </div>
            <div class="status-indicator">
                Detected State: <strong id="val-state" class="state-bad">Awaiting Data</strong>
            </div>
        </section>

        <!-- Recommender Card -->
        <section class="glass-card predictions-card">
            <h2>ML Interventions</h2>
            <p class="subtitle">Apriori Collaborative Filtering Engine</p>
            
            <div id="loading-spinner" class="hidden">
                <div class="spinner"></div>
                <p>Synthesizing Biomarkers...</p>
            </div>

            <div id="product-results" class="product-grid">
                <!-- Products dynamically injected here -->
                <div class="empty-state">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <p>Sync hardware to generate real-time product interventions.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
